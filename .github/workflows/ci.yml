name: CI

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint commit messages
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            from_sha="${{ github.event.pull_request.base.sha }}"
            to_sha="${{ github.event.pull_request.head.sha }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            from_sha="${{ github.event.before }}"
            to_sha="${{ github.sha }}"
            if [ "$from_sha" = "0000000000000000000000000000000000000000" ]; then
              from_sha="$(git rev-list --max-parents=0 "$to_sha")"
            fi
          else
            printf 'Unsupported event: %s\n' "${{ github.event_name }}" 1>&2
            exit 1
          fi

          bun ./node_modules/@commitlint/cli/cli.js --from "$from_sha" --to "$to_sha" --verbose

  checks:
    needs: commitlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Typecheck
        run: bun run typecheck

      - name: Tests
        run: bun test

      - name: Build
        run: bun run build
