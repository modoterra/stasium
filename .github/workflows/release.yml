name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
            artifact: stasium-linux-x64
          - target: linux-arm64
            runner: ubuntu-24.04-arm
            artifact: stasium-linux-arm64
          - target: macos-arm64
            runner: macos-latest
            artifact: stasium-macos-arm64
          - target: windows-x64
            runner: windows-latest
            artifact: stasium-windows-x64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: bun run build

      - name: Package
        shell: bash
        run: |
          mkdir -p release
          if [ -f dist/stasium.exe ]; then
            cp dist/stasium.exe release/
          else
            cp dist/stasium release/
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/stasium-linux-x64/stasium release/stasium-linux-x64
          cp artifacts/stasium-linux-arm64/stasium release/stasium-linux-arm64
          cp artifacts/stasium-macos-arm64/stasium release/stasium-macos-arm64
          cp artifacts/stasium-windows-x64/stasium.exe release/stasium-windows-x64.exe

      - name: Generate checksums
        working-directory: release
        run: sha256sum * > checksums.txt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            release/stasium-linux-x64 \
            release/stasium-linux-arm64 \
            release/stasium-macos-arm64 \
            release/stasium-windows-x64.exe \
            release/checksums.txt
