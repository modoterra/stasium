name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: bun run build

      - name: Package
        shell: bash
        run: |
          mkdir -p release
          if [ -f dist/stasium.exe ]; then
            cp dist/stasium.exe release/
          else
            cp dist/stasium release/
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: stasium-${{ matrix.os }}
          path: release/

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            release/stasium-ubuntu-latest/stasium#stasium-linux \
            release/stasium-macos-latest/stasium#stasium-macos \
            release/stasium-windows-latest/stasium.exe#stasium-windows.exe
