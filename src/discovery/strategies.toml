version = 1

[[strategy]]
id = "laravel-app"
label = "Laravel app server"
priority = 220
default_selected = true

[strategy.when]
all_files = ["artisan", "composer.json"]
all_json_paths = [{ file = "composer.json", path = "require.laravel/framework" }]

[strategy.service]
name = "app"
command = ["php", "artisan", "serve"]
working_dir = "."

[[strategy]]
id = "laravel-octane"
label = "Laravel Octane server"
priority = 218
default_selected = false

[strategy.when]
all_files = ["artisan", "composer.json"]
all_json_paths = [{ file = "composer.json", path = "require.laravel/framework" }]
any_json_paths = [
  { file = "composer.json", path = "require.laravel/octane" },
  { file = "composer.json", path = "require-dev.laravel/octane" },
]

[strategy.service]
name = "octane"
command = ["php", "artisan", "octane:start"]
working_dir = "."

[[strategy]]
id = "laravel-queue"
label = "Laravel queue worker"
priority = 215
default_selected = true

[strategy.when]
all_files = ["artisan", "composer.json"]
all_json_paths = [{ file = "composer.json", path = "require.laravel/framework" }]

[strategy.service]
name = "queue"
command = ["php", "artisan", "queue:work"]
working_dir = "."
depends_on_ids = ["laravel-app"]

